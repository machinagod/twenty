name: Build Railway image

# Builds the production `twenty` target (server + frontend) from our branch and
# pushes it to GHCR so Railway can deploy it. Upstream's CD only dispatches to
# twentyhq/twenty-infra, so this fork needs its own image build. Manual trigger
# keeps rebuilds controlled (Railway redeploys when we repoint it at the new tag).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve tags
        id: meta
        run: |
          printf 'sha=%s\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (twenty target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ghcr.io/machinagod/twenty:main
            ghcr.io/machinagod/twenty:${{ steps.meta.outputs.sha }}
          build-args: |
            APP_VERSION=railway-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
