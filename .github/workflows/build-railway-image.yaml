name: Build Railway image

# Builds the production `twenty` target (server + frontend) from our branch,
# pushes it to GHCR, then redeploys the Railway services so the new image
# actually goes live. Upstream's CD only dispatches to twentyhq/twenty-infra, so
# this fork needs its own build+deploy. Manual trigger (workflow_dispatch) keeps
# the gate: each upstream sync runs 100s of migrations on prod, so a human picks
# the maintenance window by dispatching this — it is NOT auto-run on push to main.
#
# Requires repo secret RAILWAY_TOKEN: a Railway *project token* (Project Settings
# -> Tokens) scoped to twenty-crm / production. The deploy job is skipped if the
# secret is absent, so the build still works without it.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve tags
        id: meta
        run: |
          printf 'sha=%s\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # APP_VERSION must be a valid semver (Twenty config validation rejects
          # anything semver.parse() can't read), so bake the package.json version.
          printf 'version=%s\n' "$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (twenty target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ghcr.io/machinagod/twenty:main
            ghcr.io/machinagod/twenty:${{ steps.meta.outputs.sha }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Redeploys the prod services so they pull the freshly-pushed :main image.
    # Twenty runs DB migrations on server boot — this is where the upstream
    # migrations actually apply to prod. Skips cleanly if RAILWAY_TOKEN is unset
    # (the build above still produces the image either way).
    steps:
      - name: Gate on RAILWAY_TOKEN
        id: gate
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::warning::RAILWAY_TOKEN not set — image built but Railway redeploy skipped. Add the secret (Railway project token) to enable the deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm i -g @railway/cli

      - name: Redeploy server + worker
        if: steps.gate.outputs.skip != 'true'
        env:
          # Project token is scoped to twenty-crm / production, so the CLI needs
          # no link/login and resolves services by name within that environment.
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway redeploy --service "Twenty" --yes
          railway redeploy --service "Twenty Worker" --yes
